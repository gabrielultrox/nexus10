services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-demo-api-key}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-demo-nexus10.firebaseapp.com}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-demo-nexus10}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-demo-nexus10.appspot.com}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-000000000000}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-1:000000000000:web:demo}
        VITE_APP_ENV: ${VITE_APP_ENV:-docker}
        VITE_FIREBASE_USE_EMULATORS: ${VITE_FIREBASE_USE_EMULATORS:-true}
        VITE_FIREBASE_FIRESTORE_EMULATOR_HOST: ${VITE_FIREBASE_FIRESTORE_EMULATOR_HOST:-localhost:8080}
        VITE_FIREBASE_AUTH_EMULATOR_HOST: ${VITE_FIREBASE_AUTH_EMULATOR_HOST:-localhost:9099}
    container_name: nexus10-frontend
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nexus10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nexus10-backend
    ports:
      - '3001:3001'
    environment:
      APP_ENV: ${APP_ENV:-development}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_PREFLIGHT_MAX_AGE_SECONDS: ${CORS_PREFLIGHT_MAX_AGE_SECONDS:-600}
      SECURITY_USER_AGENT_BLOCKLIST: ${SECURITY_USER_AGENT_BLOCKLIST:-sqlmap,nikto,masscan,zgrab,acunetix}
      RATE_LIMIT_TRUSTED_IPS: ${RATE_LIMIT_TRUSTED_IPS:-10.0.0.10,10.0.0.11}
      LOCAL_OPERATOR_PASSWORD: ${LOCAL_OPERATOR_PASSWORD:-0101}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-nexus10}
      REDIS_SOCKET_TIMEOUT_MS: ${REDIS_SOCKET_TIMEOUT_MS:-5000}
      REDIS_SESSION_TTL_SECONDS: ${REDIS_SESSION_TTL_SECONDS:-300}
      REDIS_MERCHANT_TTL_SECONDS: ${REDIS_MERCHANT_TTL_SECONDS:-180}
      REDIS_PRODUCT_TTL_SECONDS: ${REDIS_PRODUCT_TTL_SECONDS:-120}
      FIRESTORE_EMULATOR_HOST: ${FIRESTORE_EMULATOR_HOST:-firestore-emulator:8080}
      FIREBASE_AUTH_EMULATOR_HOST: ${FIREBASE_AUTH_EMULATOR_HOST:-firestore-emulator:9099}
      FIREBASE_ADMIN_PROJECT_ID: ${FIREBASE_ADMIN_PROJECT_ID:-demo-nexus10}
      FIREBASE_ADMIN_CLIENT_EMAIL: ${FIREBASE_ADMIN_CLIENT_EMAIL:-firebase-adminsdk@example.invalid}
      FIREBASE_ADMIN_PRIVATE_KEY: ${FIREBASE_ADMIN_PRIVATE_KEY:-"-----BEGIN PRIVATE KEY-----\nDEV_ONLY\n-----END PRIVATE KEY-----\n"}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-demo-nexus10}
      IFOOD_AUTH_BASE_URL: ${IFOOD_AUTH_BASE_URL:-https://merchant-api.ifood.com.br/authentication/v1.0}
      IFOOD_MERCHANT_BASE_URL: ${IFOOD_MERCHANT_BASE_URL:-https://merchant-api.ifood.com.br}
      IFOOD_EVENTS_POLLING_PATH: ${IFOOD_EVENTS_POLLING_PATH:-/events/v1.0/events:polling}
      IFOOD_EVENTS_ACK_PATH: ${IFOOD_EVENTS_ACK_PATH:-/events/v1.0/events/acknowledgment}
      IFOOD_ORDER_DETAILS_PATH: ${IFOOD_ORDER_DETAILS_PATH:-/order/v1.0/orders}
      IFOOD_WEBHOOK_URL: ${IFOOD_WEBHOOK_URL:-http://localhost:3001/webhooks/ifood}
      IFOOD_WEBHOOK_SECRET: ${IFOOD_WEBHOOK_SECRET:-dev-ifood-secret}
      IFOOD_POLLING_INTERVAL_SECONDS: ${IFOOD_POLLING_INTERVAL_SECONDS:-30}
      ZE_DELIVERY_ENABLED: ${ZE_DELIVERY_ENABLED:-false}
      ZE_DELIVERY_EMAIL: ${ZE_DELIVERY_EMAIL:-}
      ZE_DELIVERY_PASSWORD: ${ZE_DELIVERY_PASSWORD:-}
      ZE_DELIVERY_LOGIN_URL: ${ZE_DELIVERY_LOGIN_URL:-}
      ZE_DELIVERY_DASHBOARD_URL_TEMPLATE: ${ZE_DELIVERY_DASHBOARD_URL_TEMPLATE:-}
      ZE_DELIVERY_STORE_IDS: ${ZE_DELIVERY_STORE_IDS:-}
      ZE_DELIVERY_SYNC_INTERVAL_MINUTES: ${ZE_DELIVERY_SYNC_INTERVAL_MINUTES:-5}
      ZE_DELIVERY_WORKER_COUNT: ${ZE_DELIVERY_WORKER_COUNT:-2}
      ZE_DELIVERY_HEADLESS: ${ZE_DELIVERY_HEADLESS:-true}
      ZE_DELIVERY_DRY_RUN: ${ZE_DELIVERY_DRY_RUN:-false}
      ZE_DELIVERY_NEXUS_API_BASE_URL: ${ZE_DELIVERY_NEXUS_API_BASE_URL:-http://backend:3001}
      ZE_DELIVERY_SYNC_TOKEN: ${ZE_DELIVERY_SYNC_TOKEN:-}
      ZE_DELIVERY_SESSION_FILE: ${ZE_DELIVERY_SESSION_FILE:-tmp/ze-delivery-storage-state.json}
      ZE_DELIVERY_SCHEDULER_LOG_LEVEL: ${ZE_DELIVERY_SCHEDULER_LOG_LEVEL:-info}
      ZE_DELIVERY_TIMEOUT_MS: ${ZE_DELIVERY_TIMEOUT_MS:-30000}
      ZE_DELIVERY_REQUEST_DELAY_MS: ${ZE_DELIVERY_REQUEST_DELAY_MS:-500}
      ZE_DELIVERY_MAX_ORDERS_PER_RUN: ${ZE_DELIVERY_MAX_ORDERS_PER_RUN:-100}
      ZE_DELIVERY_RETRY_MAX: ${ZE_DELIVERY_RETRY_MAX:-3}
      ZE_DELIVERY_RETRY_BASE_DELAY_MS: ${ZE_DELIVERY_RETRY_BASE_DELAY_MS:-1000}
      ZE_DELIVERY_2FA_TIMEOUT_MS: ${ZE_DELIVERY_2FA_TIMEOUT_MS:-120000}
      ZE_DELIVERY_BROWSER_CHANNEL: ${ZE_DELIVERY_BROWSER_CHANNEL:-}
      ZE_DELIVERY_USER_AGENT: ${ZE_DELIVERY_USER_AGENT:-}
      ZE_DELIVERY_LOGIN_EMAIL_SELECTOR: ${ZE_DELIVERY_LOGIN_EMAIL_SELECTOR:-input[type="email"]}
      ZE_DELIVERY_LOGIN_PASSWORD_SELECTOR: ${ZE_DELIVERY_LOGIN_PASSWORD_SELECTOR:-input[type="password"]}
      ZE_DELIVERY_LOGIN_SUBMIT_SELECTOR: ${ZE_DELIVERY_LOGIN_SUBMIT_SELECTOR:-button[type="submit"]}
      ZE_DELIVERY_AFTER_LOGIN_SELECTOR: ${ZE_DELIVERY_AFTER_LOGIN_SELECTOR:-[data-testid="dashboard"]}
      ZE_DELIVERY_2FA_SELECTOR: ${ZE_DELIVERY_2FA_SELECTOR:-}
      ZE_DELIVERY_ORDER_ROW_SELECTOR: ${ZE_DELIVERY_ORDER_ROW_SELECTOR:-[data-testid="delivery-row"]}
      ZE_DELIVERY_ORDER_ID_SELECTOR: ${ZE_DELIVERY_ORDER_ID_SELECTOR:-[data-testid="delivery-id"]}
      ZE_DELIVERY_CODE_SELECTOR: ${ZE_DELIVERY_CODE_SELECTOR:-[data-testid="delivery-code"]}
      ZE_DELIVERY_STATUS_SELECTOR: ${ZE_DELIVERY_STATUS_SELECTOR:-[data-testid="delivery-status"]}
      ZE_DELIVERY_LOCATION_SELECTOR: ${ZE_DELIVERY_LOCATION_SELECTOR:-[data-testid="delivery-location"]}
      ZE_DELIVERY_COURIER_SELECTOR: ${ZE_DELIVERY_COURIER_SELECTOR:-[data-testid="delivery-courier"]}
      ZE_DELIVERY_SCANNED_BY_SELECTOR: ${ZE_DELIVERY_SCANNED_BY_SELECTOR:-[data-testid="delivery-scanned-by"]}
      ZE_DELIVERY_TIMESTAMP_SELECTOR: ${ZE_DELIVERY_TIMESTAMP_SELECTOR:-[data-testid="delivery-timestamp"]}
      ZE_DELIVERY_LAT_SELECTOR: ${ZE_DELIVERY_LAT_SELECTOR:-}
      ZE_DELIVERY_LNG_SELECTOR: ${ZE_DELIVERY_LNG_SELECTOR:-}
    depends_on:
      redis:
        condition: service_started
      firestore-emulator:
        condition: service_started
    networks:
      - nexus10
    restart: unless-stopped

  ze-delivery-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: nexus10-ze-delivery-scheduler
    command: ['pm2-runtime', 'start', 'ecosystem.config.js', '--only', 'nexus10-ze-delivery-sync']
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      ZE_DELIVERY_ENABLED: ${ZE_DELIVERY_ENABLED:-false}
      ZE_DELIVERY_EMAIL: ${ZE_DELIVERY_EMAIL:-}
      ZE_DELIVERY_PASSWORD: ${ZE_DELIVERY_PASSWORD:-}
      ZE_DELIVERY_LOGIN_URL: ${ZE_DELIVERY_LOGIN_URL:-}
      ZE_DELIVERY_DASHBOARD_URL_TEMPLATE: ${ZE_DELIVERY_DASHBOARD_URL_TEMPLATE:-}
      ZE_DELIVERY_STORE_IDS: ${ZE_DELIVERY_STORE_IDS:-}
      ZE_DELIVERY_SYNC_INTERVAL_MINUTES: ${ZE_DELIVERY_SYNC_INTERVAL_MINUTES:-5}
      ZE_DELIVERY_WORKER_COUNT: ${ZE_DELIVERY_WORKER_COUNT:-2}
      ZE_DELIVERY_HEADLESS: ${ZE_DELIVERY_HEADLESS:-true}
      ZE_DELIVERY_DRY_RUN: ${ZE_DELIVERY_DRY_RUN:-false}
      ZE_DELIVERY_NEXUS_API_BASE_URL: ${ZE_DELIVERY_NEXUS_API_BASE_URL:-http://backend:3001}
      ZE_DELIVERY_SYNC_TOKEN: ${ZE_DELIVERY_SYNC_TOKEN:-}
      ZE_DELIVERY_SESSION_FILE: ${ZE_DELIVERY_SESSION_FILE:-tmp/ze-delivery-storage-state.json}
      ZE_DELIVERY_SCHEDULER_LOG_LEVEL: ${ZE_DELIVERY_SCHEDULER_LOG_LEVEL:-info}
      ZE_DELIVERY_TIMEOUT_MS: ${ZE_DELIVERY_TIMEOUT_MS:-30000}
      ZE_DELIVERY_REQUEST_DELAY_MS: ${ZE_DELIVERY_REQUEST_DELAY_MS:-500}
      ZE_DELIVERY_MAX_ORDERS_PER_RUN: ${ZE_DELIVERY_MAX_ORDERS_PER_RUN:-100}
      ZE_DELIVERY_RETRY_MAX: ${ZE_DELIVERY_RETRY_MAX:-3}
      ZE_DELIVERY_RETRY_BASE_DELAY_MS: ${ZE_DELIVERY_RETRY_BASE_DELAY_MS:-1000}
      ZE_DELIVERY_2FA_TIMEOUT_MS: ${ZE_DELIVERY_2FA_TIMEOUT_MS:-120000}
      ZE_DELIVERY_BROWSER_CHANNEL: ${ZE_DELIVERY_BROWSER_CHANNEL:-}
      ZE_DELIVERY_USER_AGENT: ${ZE_DELIVERY_USER_AGENT:-}
      ZE_DELIVERY_LOGIN_EMAIL_SELECTOR: ${ZE_DELIVERY_LOGIN_EMAIL_SELECTOR:-input[type="email"]}
      ZE_DELIVERY_LOGIN_PASSWORD_SELECTOR: ${ZE_DELIVERY_LOGIN_PASSWORD_SELECTOR:-input[type="password"]}
      ZE_DELIVERY_LOGIN_SUBMIT_SELECTOR: ${ZE_DELIVERY_LOGIN_SUBMIT_SELECTOR:-button[type="submit"]}
      ZE_DELIVERY_AFTER_LOGIN_SELECTOR: ${ZE_DELIVERY_AFTER_LOGIN_SELECTOR:-[data-testid="dashboard"]}
      ZE_DELIVERY_2FA_SELECTOR: ${ZE_DELIVERY_2FA_SELECTOR:-}
      ZE_DELIVERY_ORDER_ROW_SELECTOR: ${ZE_DELIVERY_ORDER_ROW_SELECTOR:-[data-testid="delivery-row"]}
      ZE_DELIVERY_ORDER_ID_SELECTOR: ${ZE_DELIVERY_ORDER_ID_SELECTOR:-[data-testid="delivery-id"]}
      ZE_DELIVERY_CODE_SELECTOR: ${ZE_DELIVERY_CODE_SELECTOR:-[data-testid="delivery-code"]}
      ZE_DELIVERY_STATUS_SELECTOR: ${ZE_DELIVERY_STATUS_SELECTOR:-[data-testid="delivery-status"]}
      ZE_DELIVERY_LOCATION_SELECTOR: ${ZE_DELIVERY_LOCATION_SELECTOR:-[data-testid="delivery-location"]}
      ZE_DELIVERY_COURIER_SELECTOR: ${ZE_DELIVERY_COURIER_SELECTOR:-[data-testid="delivery-courier"]}
      ZE_DELIVERY_SCANNED_BY_SELECTOR: ${ZE_DELIVERY_SCANNED_BY_SELECTOR:-[data-testid="delivery-scanned-by"]}
      ZE_DELIVERY_TIMESTAMP_SELECTOR: ${ZE_DELIVERY_TIMESTAMP_SELECTOR:-[data-testid="delivery-timestamp"]}
      ZE_DELIVERY_LAT_SELECTOR: ${ZE_DELIVERY_LAT_SELECTOR:-}
      ZE_DELIVERY_LNG_SELECTOR: ${ZE_DELIVERY_LNG_SELECTOR:-}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const fs=require(''fs''); const path=require(''path''); const dir=path.resolve(''/app/tmp''); if(!fs.existsSync(dir)){process.exit(1)} const files=fs.readdirSync(dir).filter((name)=>name.startsWith(''ze-delivery-scheduler-state-'')); if(!files.length){process.exit(1)} const state=JSON.parse(fs.readFileSync(path.join(dir, files[0]), ''utf8'')); process.exit(state.status === ''degraded'' ? 1 : 0)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - scheduler-logs:/app/logs
      - scheduler-state:/app/tmp
    networks:
      - nexus10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexus10-redis
    command: ['redis-server', '--save', '60', '1', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - nexus10
    restart: unless-stopped

  firestore-emulator:
    image: node:18-bookworm-slim
    container_name: nexus10-firestore-emulator
    working_dir: /workspace
    environment:
      FIREBASE_PROJECT: ${FIREBASE_PROJECT:-demo-nexus10}
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx1024m
    command:
      [
        'sh',
        '-c',
        'apt-get update && apt-get install -y --no-install-recommends openjdk-17-jre-headless && rm -rf /var/lib/apt/lists/* && npm install -g firebase-tools && firebase emulators:start --project ${FIREBASE_PROJECT:-demo-nexus10} --only auth,firestore,ui --import=.firebase-emulator-data --export-on-exit=.firebase-emulator-data',
      ]
    ports:
      - '4000:4000'
      - '8080:8080'
      - '9099:9099'
    volumes:
      - ./:/workspace
      - firebase-emulator-data:/workspace/.firebase-emulator-data
      - firebase-cache:/root/.cache
    networks:
      - nexus10
    restart: unless-stopped

networks:
  nexus10:
    driver: bridge

volumes:
  redis-data:
  firebase-emulator-data:
  firebase-cache:
  scheduler-logs:
  scheduler-state:
