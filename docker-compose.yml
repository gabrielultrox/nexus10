services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    container_name: nexus10-frontend
    working_dir: /app
    ports:
      - '5173:5173'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:8787/api
      VITE_FIREBASE_USE_EMULATORS: 'true'
      VITE_FIREBASE_FIRESTORE_EMULATOR_HOST: localhost:8080
      VITE_FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
      firebase-emulator:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
    container_name: nexus10-backend
    working_dir: /app
    ports:
      - '8787:8787'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 8787
      FRONTEND_ORIGIN: http://localhost:5173
      LOCAL_OPERATOR_PASSWORD: 01
      REDIS_URL: redis://redis:6379
      FIRESTORE_EMULATOR_HOST: firebase-emulator:8080
      FIREBASE_AUTH_EMULATOR_HOST: firebase-emulator:9099
      LOG_LEVEL: info
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_started
      firebase-emulator:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8787/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: nexus10-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis_data:/data

  firebase-emulator:
    image: node:20-alpine
    container_name: nexus10-firebase-emulator
    working_dir: /app
    ports:
      - '4000:4000'
      - '8080:8080'
      - '9099:9099'
    environment:
      FIREBASE_PROJECT: demo-nexus10
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx1g
    volumes:
      - .:/app
      - firebase_cache:/root/.cache
      - firebase_data:/app/.firebase-emulator-data
    command:
      [
        'sh',
        '-c',
        'npm install -g firebase-tools && firebase emulators:start --project demo-nexus10 --import=.firebase-emulator-data --export-on-exit=.firebase-emulator-data',
      ]

volumes:
  frontend_node_modules:
  backend_node_modules:
  redis_data:
  firebase_cache:
  firebase_data:
