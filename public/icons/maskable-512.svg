<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nexus</title>
  <desc id="desc">Marca industrial-tech do Nexus com monograma N em painel escuro.</desc>
  <defs>
    <linearGradient id="panelFill" x1="108" y1="96" x2="404" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171C28"/>
      <stop offset="1" stop-color="#0F131D"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="124" y1="108" x2="392" y2="404" gradientUnits="userSpaceOnUse">
      <stop stop-color="#44506B"/>
      <stop offset="1" stop-color="#242B3B"/>
    </linearGradient>
    <linearGradient id="markFill" x1="156" y1="360" x2="356" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="markEdge" x1="188" y1="336" x2="338" y2="162" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <filter id="panelGlow" x="64" y="64" width="384" height="384" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="16" result="effect1_foregroundBlur_1_1"/>
    </filter>
    <filter id="accentGlow" x="130" y="126" width="248" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
