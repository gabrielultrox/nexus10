      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="10" result="effect1_foregroundBlur_1_1"/>
    </filter>
  </defs>

  <g filter="url(#panelGlow)">
    <rect x="96" y="96" width="320" height="320" rx="84" fill="#3B82F6" fill-opacity="0.12"/>
  </g>

  <rect x="96" y="96" width="320" height="320" rx="84" fill="url(#panelFill)"/>
  <rect x="98" y="98" width="316" height="316" rx="82" stroke="url(#panelStroke)" stroke-width="4"/>

  <path d="M152 156H216L308 276V156H360V356H296L204 236V356H152V156Z" fill="url(#markFill)"/>

  <path d="M152 356V156" stroke="url(#markEdge)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M308 156V356" stroke="url(#markEdge)" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <path d="M212 160L304 278" stroke="url(#markEdge)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>

  <g opacity="0.48">
    <path d="M136 188H174" stroke="#2A3144" stroke-width="4" stroke-linecap="round"/>
    <path d="M338 324H376" stroke="#2A3144" stroke-width="4" stroke-linecap="round"/>
    <path d="M160 388H206" stroke="#2A3144" stroke-width="4" stroke-linecap="round"/>
