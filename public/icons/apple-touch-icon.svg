    <path d="M304 214L406 164V340L304 360V214Z" fill="url(#markSecondary)"/>
    <path d="M333 177L408 136L380 198L408 188L333 231V177Z" fill="url(#markSecondary)"/>
    <path d="M304 214L406 340L348 386L304 360V214Z" fill="url(#markPrimary)"/>

    <path d="M203 147V257" stroke="url(#connector)" stroke-width="9" stroke-linecap="round"/>
    <path d="M146 332L224 256" stroke="url(#connector)" stroke-width="9" stroke-linecap="round"/>
    <path d="M147 199L224 256" stroke="url(#connector)" stroke-width="9" stroke-linecap="round"/>
