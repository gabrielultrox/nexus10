    <circle cx="203" cy="147" r="13" fill="#8854F4"/>
    <circle cx="224" cy="256" r="18" fill="#FFFFFF"/>
    <circle cx="333" cy="214" r="18" fill="#FFFFFF"/>
    <circle cx="404" cy="225" r="13" fill="#8B60F7"/>
