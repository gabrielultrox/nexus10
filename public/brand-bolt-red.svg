      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="shapeB" x1="228" y1="152" x2="360" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="shapeC" x1="300" y1="158" x2="376" y2="276" gradientUnits="userSpaceOnUse">
