<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nexus 10</title>
  <desc id="desc">Logo do Nexus 10 com base arredondada translúcida e símbolo geométrico violeta com conexões luminosas.</desc>
  <defs>
    <radialGradient id="outerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(210 210)">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.52"/>
      <stop offset="0.42" stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tileGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 230) rotate(90) scale(190 185)">
