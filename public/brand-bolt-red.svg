<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nexus 10 Bolt</title>
  <desc id="desc">Rounded square badge with a red lightning bolt.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1016"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#d32929"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8b4a"/>
      <stop offset="55%" stop-color="#ff4538"/>
      <stop offset="100%" stop-color="#a80017"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#140000" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#ff4d3d" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="14" y="14" width="228" height="228" rx="46" fill="url(#bg)" stroke="url(#edge)" stroke-width="8" filter="url(#shadow)"/>
  <rect x="28" y="28" width="200" height="200" rx="34" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <path
    d="M137 36 L78 132 H118 L101 220 L178 106 H137 Z"
    fill="url(#bolt)"
    filter="url(#glow)"
  />
</svg>
