<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nexus 10</title>
  <desc id="desc">Marca minimalista do Nexus 10 com base arredondada e monograma geométrico em forma de N.</desc>
  <defs>
    <linearGradient id="tileStroke" x1="128" y1="96" x2="384" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7F0FF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#B8CCFF" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="tileFill" x1="156" y1="120" x2="356" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#DDE7FF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="markStroke" x1="170" y1="344" x2="346" y2="168" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="88" y="56" width="336" height="400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="nodeGlow" x="145" y="141" width="222" height="230" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <rect x="140" y="108" width="232" height="296" rx="62" fill="#8B5CF6" fill-opacity="0.24"/>
  </g>

  <rect x="110" y="78" width="292" height="356" rx="68" fill="url(#tileFill)"/>
  <rect x="111" y="79" width="290" height="354" rx="67" stroke="url(#tileStroke)" stroke-width="2"/>

  <path d="M184 336V192" stroke="url(#markStroke)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M184 192L256 256L328 176" stroke="url(#markStroke)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M328 176V320" stroke="url(#markStroke)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#nodeGlow)">
    <circle cx="184" cy="192" r="10" fill="#FFFFFF"/>
    <circle cx="256" cy="256" r="10" fill="#FFFFFF"/>
    <circle cx="328" cy="176" r="10" fill="#FFFFFF"/>
  </g>

  <circle cx="184" cy="336" r="8" fill="#6D28D9"/>
  <circle cx="328" cy="320" r="8" fill="#6D28D9"/>
</svg>
