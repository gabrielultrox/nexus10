<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nexus</title>
  <desc id="desc">Logo minimalista do Nexus com monograma em N dentro de um quadrado arredondado.</desc>
  <defs>
    <linearGradient id="tileBorder" x1="120" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDE9FE"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="markGradient" x1="168" y1="356" x2="344" y2="164" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4C1D95"/>
      <stop offset="0.52" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="outerGlow" x="40" y="40" width="432" height="432" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="18" result="effect1_foregroundBlur_1_1"/>
    </filter>
  </defs>

  <g filter="url(#outerGlow)">
    <rect x="112" y="112" width="288" height="288" rx="72" fill="#8B5CF6" fill-opacity="0.12"/>
  </g>

  <rect x="96" y="96" width="320" height="320" rx="80" fill="#FFFFFF"/>
  <rect x="98" y="98" width="316" height="316" rx="78" stroke="url(#tileBorder)" stroke-width="4"/>

  <path d="M176 340V172" stroke="url(#markGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M176 172L336 340" stroke="url(#markGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M336 340V172" stroke="url(#markGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="176" cy="172" r="11" fill="#8B5CF6"/>
  <circle cx="176" cy="340" r="11" fill="#6D28D9"/>
  <circle cx="336" cy="172" r="11" fill="#A78BFA"/>
  <circle cx="336" cy="340" r="11" fill="#7C3AED"/>
</svg>
