name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    outputs:
      lint_outcome: ${{ steps.lint.outcome }}
      coverage_outcome: ${{ steps.coverage.outcome }}
      statements_pct: ${{ steps.coverage_summary.outputs.statementsPct }}
      branches_pct: ${{ steps.coverage_summary.outputs.branchesPct }}
      functions_pct: ${{ steps.coverage_summary.outputs.functionsPct }}
      lines_pct: ${{ steps.coverage_summary.outputs.linesPct }}
      below_threshold: ${{ steps.coverage_summary.outputs.belowThreshold }}
      coverage_warning: ${{ steps.coverage_summary.outputs.warning }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run tests with coverage
        id: coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Parse coverage summary
        id: coverage_summary
        if: always()
        shell: bash
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs')
          const path = 'coverage/coverage-final.json'

          const empty = {
            statementsPct: '0.00',
            branchesPct: '0.00',
            functionsPct: '0.00',
            linesPct: '0.00',
            belowThreshold: 'true',
            warning: 'Coverage report not generated.',
          }

          if (!fs.existsSync(path)) {
            for (const [key, value] of Object.entries(empty)) {
              console.log(`${key}=${value}`)
            }
            process.exit(0)
          }

          const report = JSON.parse(fs.readFileSync(path, 'utf8'))
          const totals = {
            statements: { covered: 0, total: 0 },
            branches: { covered: 0, total: 0 },
            functions: { covered: 0, total: 0 },
            lines: { covered: 0, total: 0 },
          }

          for (const file of Object.values(report)) {
            if (!file || typeof file !== 'object') continue

            if (file.s) {
              for (const hits of Object.values(file.s)) {
                totals.statements.total += 1
                if (hits > 0) totals.statements.covered += 1
              }
            }

            if (file.b) {
              for (const branchHits of Object.values(file.b)) {
                for (const hits of branchHits) {
                  totals.branches.total += 1
                  if (hits > 0) totals.branches.covered += 1
                }
              }
            }

            if (file.f) {
              for (const hits of Object.values(file.f)) {
                totals.functions.total += 1
                if (hits > 0) totals.functions.covered += 1
              }
            }

            if (file.statementMap) {
              for (const [id] of Object.entries(file.statementMap)) {
                const hits = file.s?.[id] ?? 0
                totals.lines.total += 1
                if (hits > 0) totals.lines.covered += 1
              }
            }
          }

          const pct = ({ covered, total }) => (total ? ((covered / total) * 100).toFixed(2) : '0.00')
          const summary = {
            statementsPct: pct(totals.statements),
            branchesPct: pct(totals.branches),
            functionsPct: pct(totals.functions),
            linesPct: pct(totals.lines),
          }

          const belowThreshold = Object.values(summary).some((value) => Number(value) < 70)
          const warning = belowThreshold
            ? 'Warning: coverage is below the 70% target for this baseline.'
            : 'Coverage is on or above the 70% target.'

          for (const [key, value] of Object.entries({
            ...summary,
            belowThreshold: String(belowThreshold),
            warning,
          })) {
            console.log(`${key}=${value}`)
          }
          EOF

      - name: Fail quality job if lint or coverage failed
        if: always()
        shell: bash
        run: |
          failed=0

          if [ "${{ steps.lint.outcome }}" != "success" ]; then
            echo "Lint failed."
            failed=1
          fi

          if [ "${{ steps.coverage.outcome }}" != "success" ]; then
            echo "Coverage step failed."
            failed=1
          fi

          exit $failed

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  pr-report:
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - quality
      - build
    permissions:
      pull-requests: write

    steps:
      - name: Comment PR status
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ needs.quality.outputs.lint_outcome }}
          COVERAGE_OUTCOME: ${{ needs.quality.outputs.coverage_outcome }}
          BUILD_OUTCOME: ${{ needs.build.result }}
          STATEMENTS_PCT: ${{ needs.quality.outputs.statements_pct }}
          BRANCHES_PCT: ${{ needs.quality.outputs.branches_pct }}
          FUNCTIONS_PCT: ${{ needs.quality.outputs.functions_pct }}
          LINES_PCT: ${{ needs.quality.outputs.lines_pct }}
          BELOW_THRESHOLD: ${{ needs.quality.outputs.below_threshold }}
          COVERAGE_WARNING: ${{ needs.quality.outputs.coverage_warning }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- nexus10-ci-report -->'
            const icon = (outcome) => outcome === 'success' ? '[pass]' : outcome === 'failure' ? '[fail]' : '[skip]'
            const allPassed = ['success', 'success', 'success'].every((expected, index) => {
              const outcomes = [
                process.env.LINT_OUTCOME,
                process.env.COVERAGE_OUTCOME,
                process.env.BUILD_OUTCOME,
              ]
              return outcomes[index] === expected
            })

            const statusLine = allPassed ? '## CI succeeded' : '## CI failed'
            const warningBlock = process.env.BELOW_THRESHOLD === 'true'
              ? `\n> ${process.env.COVERAGE_WARNING}\n`
              : ''

            const body = `${marker}
            ${statusLine}

            | Job | Result |
            | --- | --- |
            | Lint | ${icon(process.env.LINT_OUTCOME)} ${process.env.LINT_OUTCOME} |
            | Test coverage | ${icon(process.env.COVERAGE_OUTCOME)} ${process.env.COVERAGE_OUTCOME} |
            | Build | ${icon(process.env.BUILD_OUTCOME)} ${process.env.BUILD_OUTCOME} |

            ### Coverage

            | Metric | Result |
            | --- | --- |
            | Statements | ${process.env.STATEMENTS_PCT}% |
            | Branches | ${process.env.BRANCHES_PCT}% |
            | Functions | ${process.env.FUNCTIONS_PCT}% |
            | Lines | ${process.env.LINES_PCT}% |
            ${warningBlock}
            `

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            })
