name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ESLint checks the React source tree and Prettier enforces repository formatting.
      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

  backend_tests:
    name: Backend tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend Vitest suite
        run: npm run test:backend

  frontend_tests:
    name: Frontend tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend Vitest suite
        run: npm run test:frontend

  coverage:
    name: Coverage gate (Node 20)
    runs-on: ubuntu-latest
    outputs:
      statements: ${{ steps.coverage_summary.outputs.statements }}
      branches: ${{ steps.coverage_summary.outputs.branches }}
      functions: ${{ steps.coverage_summary.outputs.functions }}
      lines: ${{ steps.coverage_summary.outputs.lines }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # This command already fails if coverage drops below the 70% thresholds in vitest.config.ts.
      - name: Run coverage
        run: npm run test:coverage

      - name: Read coverage summary
        id: coverage_summary
        shell: bash
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs')
          const path = 'coverage/backend/coverage-summary.json'

          if (!fs.existsSync(path)) {
            throw new Error(`Coverage summary not found at ${path}`)
          }

          const summary = JSON.parse(fs.readFileSync(path, 'utf8')).total
          console.log(`statements=${summary.statements.pct}`)
          console.log(`branches=${summary.branches.pct}`)
          console.log(`functions=${summary.functions.pct}`)
          console.log(`lines=${summary.lines.pct}`)
          EOF

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/backend
          if-no-files-found: error
          retention-days: 14

  build_frontend:
    name: Build frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # Bundle analysis is produced once to avoid duplicate artifacts across the matrix.
      - name: Generate bundle analysis
        if: matrix.node == 20
        run: npm run analyze:bundle

      - name: Upload bundle analysis artifact
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: output/bundle-report.html
          if-no-files-found: error
          retention-days: 14

  pr_comment:
    name: PR status comment
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - lint
      - backend_tests
      - frontend_tests
      - coverage
      - build_frontend

    steps:
      - name: Publish PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- nexus10-ci-status -->'
            const resultIcon = {
              success: '✅',
              failure: '❌',
              cancelled: '⚪',
              skipped: '⚪',
            }

            const coverage = {
              statements: '${{ needs.coverage.outputs.statements }}',
              branches: '${{ needs.coverage.outputs.branches }}',
              functions: '${{ needs.coverage.outputs.functions }}',
              lines: '${{ needs.coverage.outputs.lines }}',
            }

            const body = `${marker}
            ## CI status

            | Job | Result |
            | --- | --- |
            | Lint (ESLint + Prettier) | ${resultIcon['${{ needs.lint.result }}']} ${{ needs.lint.result }} |
            | Backend tests | ${resultIcon['${{ needs.backend_tests.result }}']} ${{ needs.backend_tests.result }} |
            | Frontend tests | ${resultIcon['${{ needs.frontend_tests.result }}']} ${{ needs.frontend_tests.result }} |
            | Build frontend | ${resultIcon['${{ needs.build_frontend.result }}']} ${{ needs.build_frontend.result }} |
            | Coverage gate | ${resultIcon['${{ needs.coverage.result }}']} ${{ needs.coverage.result }} |

            ### Coverage summary

            | Metric | Result |
            | --- | --- |
            | Statements | ${coverage.statements || 'n/a'}% |
            | Branches | ${coverage.branches || 'n/a'}% |
            | Functions | ${coverage.functions || 'n/a'}% |
            | Lines | ${coverage.lines || 'n/a'}% |

            Coverage fails the workflow if any metric is below 70%.

            ### Artifacts

            - `coverage-report`
            - `bundle-analysis`
            `

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
